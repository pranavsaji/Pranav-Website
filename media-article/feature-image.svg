<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#040d1e"/>
      <stop offset="0.55" stop-color="#0a1a33"/>
      <stop offset="1" stop-color="#04101f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="danger" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRed" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ef4444" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="220" cy="140" r="320" fill="url(#glowBlue)"/>
  <circle cx="1010" cy="250" r="300" fill="url(#glowRed)"/>

  <!-- faint grid -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.22">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- right-side motif: code braces with a poison droplet, fully clear of text -->
  <g transform="translate(1020,235)">
    <text x="-92" y="62" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="190" font-weight="700" fill="#274b73">{</text>
    <text x="92" y="62" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="190" font-weight="700" fill="#274b73">}</text>
    <circle cx="0" cy="-6" r="40" fill="url(#danger)" filter="url(#soft)"/>
    <path d="M0 -66 C 24 -30, 32 -6, 0 10 C -32 -6, -24 -30, 0 -66 Z" fill="#ef4444"/>
    <path d="M0 -56 C 16 -28, 22 -10, 0 2 C -22 -10, -16 -28, 0 -56 Z" fill="#f97316"/>
  </g>

  <!-- kicker -->
  <text x="90" y="150" font-family="Menlo, Consolas, monospace" font-size="22" letter-spacing="6" fill="#7dd3fc">AI SECURITY  /  AGENTS  /  MCP</text>

  <!-- headline -->
  <text x="88" y="272" font-family="Helvetica Neue, Arial, sans-serif" font-size="92" font-weight="800" fill="url(#blue)">MCP</text>
  <text x="318" y="272" font-family="Helvetica Neue, Arial, sans-serif" font-size="92" font-weight="800" fill="url(#danger)">POISONING</text>

  <!-- subhead -->
  <text x="90" y="350" font-family="Helvetica Neue, Arial, sans-serif" font-size="38" font-weight="600" fill="#e2e8f0">Your AI agent trusts its tools too much.</text>

  <!-- supporting line -->
  <text x="90" y="402" font-family="Helvetica Neue, Arial, sans-serif" font-size="25" fill="#94a3b8">Hidden instructions in tool descriptions are the new attack surface.</text>

  <!-- byline -->
  <rect x="90" y="505" width="56" height="4" fill="url(#blue)"/>
  <text x="90" y="545" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="600" fill="#cbd5e1">Pranav Saji</text>
  <text x="90" y="573" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" fill="#64748b">Head of AI Security</text>
</svg>
